  <!-- Info Section -->
  <section class="vishwa-info">

<style>
  /* General */
body {
  font-family: "Poppins", Arial, sans-serif;
  margin: 0;
  padding: 0;
  background-color: #f4f3ff;
  color: #333;
}

/* Header */
.vishwa-header {
  background: linear-gradient(90deg, #6c5dc1, #8e7dff);
  color: #fff;
  text-align: center;
  padding: 20px 0;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

.vishwa-title {
  margin: 0;
  font-size: 2rem;
}

.vishwa-menu {
  list-style: none;
  padding: 0;
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.vishwa-menu li {
  margin: 0 15px;
}

.vishwa-menu a {
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  transition: 0.3s;
}

.vishwa-menu a:hover,
.vishwa-active {

}

/* Info Section */
.vishwa-info {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin: 30px auto;
  gap: 20px;
  max-width: 1000px;
}

.vishwa-card {
  background-color: #ffffff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
  text-align: center;
  font-weight: 500;
  flex: 1 1 250px;
}

/* Contact Section */
#vishwa-contact {
  background-color: #ffffff;
  padding: 40px 20px;
  margin: 30px auto;
  max-width: 600px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
  text-align: center;
}

.vishwa-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.vishwa-form input,
.vishwa-form textarea {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 1rem;
  width: 100%;
  box-sizing: border-box;
}

.vishwa-btn {
  background-color: #6c5dc1;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  transition: background 0.3s;
}

.vishwa-btn:hover {
  background-color: #5949b5;
}

/* Footer */
.vishwa-footer {
  background-color: #222;
  color: #ccc;
  text-align: center;
  padding: 15px;
  font-size: 0.9rem;
}

/* Responsive */

  }

<script>
document.getElementById("vishwaForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    vishwaName: document.getElementById("vishwaName").value,
    vishwaEmail: document.getElementById("vishwaEmail").value,
    vishwaMessage: document.getElementById("vishwaMessage").value,
  };

  const response = await fetch("/send-message", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data),
  });

  const result = await response.json();
  alert(result.message);
  e.target.reset();
});
</script>
<script src="script.js"></script>
